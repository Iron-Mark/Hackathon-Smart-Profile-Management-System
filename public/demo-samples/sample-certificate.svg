<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" aria-labelledby="title desc" role="img" viewBox="0 0 1200 800"><title id="title">Sample certificate for Smart Profile demo</title><desc id="desc">A safe sample credential image for testing the public demo upload flow.</desc><rect width="1200" height="800" fill="#f8fafc"/><rect width="1040" height="640" x="80" y="80" fill="#fff" stroke="#166534" stroke-width="8" rx="18"/><rect width="960" height="560" x="120" y="120" fill="none" stroke="#ca8a04" stroke-width="3" rx="10"/><text x="600" y="210" fill="#14532d" font-family="Georgia, serif" font-size="58" text-anchor="middle">Certificate of Completion</text><text x="600" y="310" fill="#334155" font-family="Arial, sans-serif" font-size="30" text-anchor="middle">Awarded to</text><text x="600" y="390" fill="#111827" font-family="Georgia, serif" font-size="48" text-anchor="middle">Demo Faculty Member</text><text x="600" y="470" fill="#334155" font-family="Arial, sans-serif" font-size="28" text-anchor="middle">for completing the CCIS Professional Development Workshop</text><text x="600" y="555" fill="#64748b" font-family="Arial, sans-serif" font-size="24" text-anchor="middle">Use this sample file only for public showcase testing.</text><line x1="210" x2="460" y1="630" y2="630" stroke="#334155" stroke-width="2"/><line x1="740" x2="990" y1="630" y2="630" stroke="#334155" stroke-width="2"/><text x="335" y="665" fill="#334155" font-family="Arial, sans-serif" font-size="20" text-anchor="middle">Program Chair</text><text x="865" y="665" fill="#334155" font-family="Arial, sans-serif" font-size="20" text-anchor="middle">Demo Date</text></svg>