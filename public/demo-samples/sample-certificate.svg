<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Sample certificate for Smart Profile demo</title>
  <desc id="desc">A safe sample credential image for testing the public demo upload flow.</desc>
  <rect width="1200" height="800" fill="#f8fafc"/>
  <rect x="80" y="80" width="1040" height="640" rx="18" fill="#ffffff" stroke="#166534" stroke-width="8"/>
  <rect x="120" y="120" width="960" height="560" rx="10" fill="none" stroke="#ca8a04" stroke-width="3"/>
  <text x="600" y="210" text-anchor="middle" font-family="Georgia, serif" font-size="58" fill="#14532d">Certificate of Completion</text>
  <text x="600" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#334155">Awarded to</text>
  <text x="600" y="390" text-anchor="middle" font-family="Georgia, serif" font-size="48" fill="#111827">Demo Faculty Member</text>
  <text x="600" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#334155">for completing the CCIS Professional Development Workshop</text>
  <text x="600" y="555" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#64748b">Use this sample file only for public showcase testing.</text>
  <line x1="210" y1="630" x2="460" y2="630" stroke="#334155" stroke-width="2"/>
  <line x1="740" y1="630" x2="990" y2="630" stroke="#334155" stroke-width="2"/>
  <text x="335" y="665" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#334155">Program Chair</text>
  <text x="865" y="665" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#334155">Demo Date</text>
</svg>
