name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]

    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm run lint
    - run: npm run security:scan
    - run: npm run seo:check
    - run: npm run build
      env:
        VITE_BASE_PATH: /Hackathon-Smart-Profile-Management-System/
        VITE_DEMO_MODE: true
        VITE_SITE_URL: https://iron-mark.github.io/Hackathon-Smart-Profile-Management-System/
        VITE_CLERK_PUBLISHABLE_KEY: ${{ vars.VITE_CLERK_PUBLISHABLE_KEY }}
    - run: npm run links:check
    - run: npm test -- --run
    - run: npx playwright install --with-deps chromium
    - name: Run Pages-style Playwright tests
      env:
        PLAYWRIGHT_BASE_URL: http://127.0.0.1:4173/Hackathon-Smart-Profile-Management-System
        PLAYWRIGHT_WEB_SERVER_URL: http://127.0.0.1:4173/Hackathon-Smart-Profile-Management-System/
        PLAYWRIGHT_WEB_SERVER_COMMAND: npm run preview:pages
        PLAYWRIGHT_BASE_PATH: /Hackathon-Smart-Profile-Management-System/
      run: npx playwright test --reporter=line
